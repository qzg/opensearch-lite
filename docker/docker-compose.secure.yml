services:
  opensearch-lite:
    build:
      context: ..
      dockerfile: docker/opensearch-lite.Dockerfile
    command:
      - --listen
      - 0.0.0.0:9200
      - --allow-nonlocal-listen
      - --tls-cert-file
      - /run/opensearch-lite/tls/tls.crt
      - --tls-key-file
      - /run/opensearch-lite/tls/tls.key
      - --tls-ca-file
      - /run/opensearch-lite/tls/ca.crt
      - --users-file
      - /run/opensearch-lite/auth/users.json
      - --data-dir
      - /var/lib/opensearch-lite/data
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - ./security/tls.crt:/run/opensearch-lite/tls/tls.crt:ro
      - ./security/tls.key:/run/opensearch-lite/tls/tls.key:ro
      - ./security/ca.crt:/run/opensearch-lite/tls/ca.crt:ro
      - ./security/users.json:/run/opensearch-lite/auth/users.json:ro
      - opensearch-lite-data:/var/lib/opensearch-lite/data

volumes:
  opensearch-lite-data:
