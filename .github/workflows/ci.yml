name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  rust-and-clients:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: cargo fmt --check
      - run: cargo test
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: scripts/run-python-client-smoke.sh
      - run: scripts/run-javascript-client-smoke.sh
      - run: scripts/run-java-client-smoke.sh
      - run: scripts/run-performance-gates.sh

  opensearch-parity:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: OPENSEARCH_PARITY_DOCKER=1 scripts/run-opensearch-parity-smoke.sh
